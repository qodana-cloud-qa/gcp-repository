name: Qodana Configuration Upload

on:
    push:
        branches: [ main, dev ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    upload-qodana-config:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Run Qodana Configuration Uploader
              env:
                  QODANA_CONFIGURATIONS_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJvcmdhbml6YXRpb25JZCI6IllEajU2IiwidG9rZW5JZCI6ImdCNm5iIn0.Z4XOgNAXjiLFVykJenRKDvn8oNh8ytu1_iChHlvZ1vs
              run: |
                  docker run --rm \
                    -v $(pwd):/workspace \
                    -w /workspace \
                    -e QODANA_CONFIGURATIONS_TOKEN=$QODANA_CONFIGURATIONS_TOKEN \
                    jetbrains/qodana-configuration-uploader:latest \
                    --global-configs-file qodana-global-configurations.yaml \
                    --qodana-host https://web.cloud.sssa-stgn.aws.intellij.net
